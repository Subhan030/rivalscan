version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./test.db:/app/test.db
    environment:
      - DATABASE_URL=sqlite:///./data/rivalscan.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SEARCH_API_KEY=${SEARCH_API_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
